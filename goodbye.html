<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>旅程告别 | Miss&Found</title>
    <meta name="description" content="结束旅程后，为它保存一张温柔的创口贴纪念卡。" />
    <link rel="stylesheet" href="./css/style.css" />
    <style>
      .goodbye-page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px 16px 32px;
      }

      .goodbye-wrap {
        width: 100%;
        max-width: 520px;
        margin: 0 auto;
      }

      .goodbye-header {
        margin: 0 0 24px;
        text-align: center;
      }

      .bandage-frame {
        border-radius: 24px;
        padding: 24px;
        border: 1px solid rgba(255, 255, 255, 0.24);
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.08));
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: var(--shadow-soft);
      }

      .bandage-card {
        position: relative;
        width: 100%;
        max-width: 480px;
        margin: 0 auto;
        min-height: clamp(240px, 58vw, 320px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px 8px;
      }

      .bandage-card__shell {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }

      .bandage-card__bg {
        width: 100%;
        height: 100%;
        max-width: 100%;
        object-fit: contain;
        object-position: center;
        display: block;
        filter: drop-shadow(0 10px 28px rgba(196, 181, 216, 0.22));
        opacity: 0.92;
      }

      .bandage-card__decor {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
      }

      .bandage-deco {
        position: absolute;
        color: rgba(255, 255, 255, 0.72);
        filter: drop-shadow(0 2px 8px rgba(196, 181, 216, 0.35));
      }

      .bandage-deco--cat {
        left: 6%;
        bottom: 10%;
        width: clamp(36px, 10vw, 52px);
        height: auto;
        opacity: 0.28;
      }

      .bandage-deco--star {
        top: 12%;
        right: 7%;
        width: clamp(22px, 6vw, 30px);
        height: auto;
        opacity: 0.34;
        color: rgba(255, 248, 255, 0.88);
      }

      .bandage-card__content {
        position: relative;
        z-index: 2;
        width: min(100%, 340px);
        padding: 48px 32px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        text-align: center;
        border-radius: 18px;
        background: transparent;
      }

      .bandage__title {
        margin: 0;
        font-family: var(--font-family-title);
        font-weight: 700;
        font-size: clamp(1rem, 3vw, 1.22rem);
        letter-spacing: 0.05em;
        line-height: 1.55;
        color: rgba(68, 50, 92, 0.96);
        text-shadow: 0 1px 2px rgba(255, 255, 255, 0.92);
        text-wrap: balance;
      }

      .bandage__avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        margin: -4px auto 0;
        overflow: hidden;
        box-shadow: 0 0 10px rgba(196, 181, 216, 0.35);
      }

      .bandage__avatar .avatar-img {
        border-radius: 50%;
      }

      .bandage__summary {
        margin: 0;
        font-size: clamp(0.82rem, 2.2vw, 0.92rem);
        font-weight: 300;
        line-height: 1.75;
        letter-spacing: 0.02em;
        color: rgba(108, 92, 128, 0.9);
        text-shadow: 0 1px 2px rgba(255, 255, 255, 0.9);
        text-wrap: pretty;
      }

      .bandage__num {
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        color: #a878b8;
        padding: 0 1px;
      }

      .bandage__farewell {
        margin: 0;
        padding: 0;
        border: 0;
        max-width: 28em;
        font-family: var(--font-family-title);
        font-size: clamp(0.82rem, 2.2vw, 0.94rem);
        font-weight: 400;
        line-height: 1.75;
        font-style: italic;
        letter-spacing: 0.03em;
        color: rgba(118, 88, 138, 0.92);
        text-shadow: 0 1px 2px rgba(255, 255, 255, 0.9);
        text-wrap: pretty;
        hanging-punctuation: allow-end;
      }

      .bandage__farewell::before {
        content: "\201C";
        color: rgba(196, 181, 216, 0.85);
        margin-right: 2px;
      }

      .bandage__farewell::after {
        content: "\201D";
        color: rgba(196, 181, 216, 0.85);
        margin-left: 2px;
      }

      .bandage__farewell-tail {
        white-space: nowrap;
      }

      .goodbye-actions {
        margin-top: 20px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        max-width: 520px;
        margin-left: auto;
        margin-right: auto;
      }

      .goodbye-actions .btn {
        width: 100%;
      }

      .error-box {
        text-align: center;
      }

      .tip {
        position: fixed;
        right: 14px;
        top: 14px;
        z-index: 22;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.28);
        background: rgba(74, 85, 120, 0.78);
        backdrop-filter: blur(14px);
        padding: 10px 16px;
        font-size: 0.84rem;
        font-weight: 300;
        letter-spacing: 0.04em;
        opacity: 0;
        translate: 0 -8px;
        transition:
          opacity var(--transition-fast),
          translate var(--transition-fast);
        pointer-events: none;
      }

      .tip.is-show {
        opacity: 1;
        translate: 0 0;
      }

      @keyframes bandage-enter {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .bandage-frame {
        animation: bandage-enter var(--transition-slow) both;
      }

      @media (max-width: 640px) {
        .goodbye-actions {
          grid-template-columns: 1fr;
        }

        .bandage-card__content {
          padding: 44px 28px;
          width: min(100%, 320px);
        }

        .bandage-deco--cat {
          left: 4%;
          bottom: 8%;
          opacity: 0.22;
        }

        .bandage-deco--star {
          top: 10%;
          right: 5%;
          opacity: 0.28;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-photo-bg" style="background-image: url('images/bg-swing-flowers.png')" aria-hidden="true"></div>
    <div class="dream-bg" aria-hidden="true">
      <div class="dream-bg__clouds"></div>
      <div class="dream-bg__layer dream-bg__layer--a"></div>
      <div class="dream-bg__layer dream-bg__layer--b"></div>
      <div class="dream-bg__layer dream-bg__layer--c"></div>
      <div class="dream-bg__grain"></div>
    </div>

    <main class="goodbye-page page-shell" data-parallax-root>
      <div class="page-container">
      <section id="goodbye-wrap" class="goodbye-wrap"></section>
      </div>
    </main>

    <div id="tip" class="tip" role="status" aria-live="polite"></div>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script type="module">
      import { STORAGE_KEYS } from "./js/data.js";
      import { getItems, read } from "./js/storage.js";
      import { initPageEffects } from "./js/effects.js";
      import { applyAvatarToElement } from "./js/avatar.js";

      const wrapEl = document.getElementById("goodbye-wrap");
      const tipEl = document.getElementById("tip");
      let tipTimer = null;

      const showTip = (text) => {
        tipEl.textContent = text;
        tipEl.classList.add("is-show");
        if (tipTimer) window.clearTimeout(tipTimer);
        tipTimer = window.setTimeout(() => tipEl.classList.remove("is-show"), 2000);
      };

      const nowIso = () => new Date().toISOString();
      const escapeHtml = (value) =>
        String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");

      const daysFrom = (iso) => {
        const date = new Date(iso || nowIso());
        if (Number.isNaN(date.getTime())) return 1;
        const diff = Date.now() - date.getTime();
        return Math.max(1, Math.floor(diff / 86400000) + 1);
      };

      const getItemById = (id) => {
        const items = getItems();
        return items.find((it) => it.id === id) || null;
      };

      const getTravelStats = (id, createdAt) => {
        const posts = read(STORAGE_KEYS.posts, []);
        const mine = Array.isArray(posts) ? posts.filter((p) => p.itemId === id) : [];
        const cities = new Set(mine.map((p) => p.city).filter(Boolean));
        return {
          days: daysFrom(createdAt),
          cities: cities.size,
          posts: mine.length
        };
      };

      const getFarewellText = (id) => {
        const conversations = read(STORAGE_KEYS.conversations, {});
        const list = Array.isArray(conversations?.[id]) ? conversations[id] : [];
        const farewell = [...list].reverse().find((msg) => msg && msg.from === "bot" && msg.type === "farewell");
        return farewell?.text || "我替你看过这个世界啦，现在要回心里去了。别难过，我一直在。";
      };

      const renderError = (text) => {
        wrapEl.innerHTML = `
          <section class="glass-card card-standard error-box">
            <h1 class="title">旅程记录有点模糊</h1>
            <p class="subtitle">${text}</p>
            <a class="btn" href="./museum.html">回到博物馆</a>
          </section>
        `;
      };

      const formatFarewellHtml = (text) => {
        const safe = escapeHtml(text);
        if (safe.length <= 8) return safe;
        const head = safe.slice(0, -4);
        const tail = safe.slice(-4);
        return `${head}<span class="bandage__farewell-tail">${tail}</span>`;
      };

      const formatSummaryHtml = (stats) =>
        `共旅行 <span class="bandage__num">${stats.days}</span> 天，到过 <span class="bandage__num">${stats.cities}</span> 个地方，发了 <span class="bandage__num">${stats.posts}</span> 条朋友圈。`;

      const BANDAGE_DECOR = `
        <svg class="bandage-deco bandage-deco--cat" viewBox="0 0 64 48" fill="currentColor" aria-hidden="true">
          <ellipse cx="22" cy="38" rx="14" ry="5" opacity="0.35"/>
          <path d="M14 28c0-8 6-14 14-14s14 6 14 14c0 4-2 8-5 10l-2 6h-6l-2-6c-3-2-5-6-5-10z"/>
          <circle cx="18" cy="24" r="2.5"/>
          <circle cx="30" cy="24" r="2.5"/>
          <path d="M10 18l-4-6M54 18l4-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        </svg>
        <svg class="bandage-deco bandage-deco--star" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2l2.6 6.4L21 9.2l-5 4.3 1.6 6.5L12 16.8 6.4 20l1.6-6.5-5-4.3 6.4-.8L12 2z"/>
        </svg>
      `;

      const renderMain = (item, stats) => {
        const name = item.name || item.title || "这位旅伴";
        const summaryHtml = formatSummaryHtml(stats);
        const farewellHtml = formatFarewellHtml(getFarewellText(item.id));
        wrapEl.innerHTML = `
          <header class="goodbye-header">
            <h1 class="title">旅程告别</h1>
            <p class="subtitle text-body">有些陪伴不会结束，只是换成温柔的想念。</p>
          </header>

          <section id="bandage-export" class="bandage-frame card-standard">
            <div class="bandage-card">
              <div class="bandage-card__shell" aria-hidden="true">
                <img class="bandage-card__bg" src="./images/asset-bandage.png" alt="" />
              </div>
              <div class="bandage-card__decor" aria-hidden="true">${BANDAGE_DECOR}</div>
              <div class="bandage-card__content">
                <h2 class="bandage__title">你送它看过世界，现在它回家了。</h2>
                ${item.avatarImage ? '<div id="bandage-avatar" class="bandage__avatar"></div>' : ""}
                <p class="bandage__summary text-body">${summaryHtml}</p>
                <blockquote class="bandage__farewell">${farewellHtml}</blockquote>
              </div>
            </div>
          </section>

          <div class="goodbye-actions">
            <button id="save-btn" class="btn" type="button">保存这张创口贴</button>
            <button id="share-btn" class="btn" type="button">分享</button>
            <a class="btn" href="./museum.html">回到博物馆</a>
            <a class="btn" href="./home.html">回到首页</a>
          </div>
        `;

        const avatarEl = document.getElementById("bandage-avatar");
        if (avatarEl) applyAvatarToElement(avatarEl, item);

        const saveBtn = document.getElementById("save-btn");
        const shareBtn = document.getElementById("share-btn");
        const bandageExport = document.getElementById("bandage-export");

        saveBtn.addEventListener("click", async () => {
          if (!window.html2canvas) {
            showTip("导出组件还未就绪");
            return;
          }
          const canvas = await window.html2canvas(bandageExport, {
            useCORS: true,
            backgroundColor: null,
            scale: Math.min(2, window.devicePixelRatio || 1.5)
          });
          const link = document.createElement("a");
          const safeName = String(name).replace(/[\\/:*?"<>|]/g, "-");
          link.download = `goodbye-${safeName}.png`;
          link.href = canvas.toDataURL("image/png");
          link.click();
          showTip("创口贴已保存");
        });

        shareBtn.addEventListener("click", async () => {
          const shareText = `我在 Miss&Found 送 ${name} 看过世界，现在它回家了。`;
          const shareData = { title: "Miss&Found 告别页", text: shareText, url: window.location.href };

          if (navigator.share) {
            try {
              await navigator.share(shareData);
              showTip("已调起分享");
            } catch (_err) {
              // 用户取消分享不提示错误
            }
            return;
          }

          try {
            await navigator.clipboard.writeText(window.location.href);
            showTip("链接已复制");
          } catch (_err) {
            showTip("复制失败，请手动复制链接");
          }
        });
      };

      const init = () => {
        initPageEffects();
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        if (!id) {
          renderError("没有找到要告别的旅伴。");
          return;
        }

        let item = null;
        try {
          item = getItemById(id);
        } catch (_err) {
          renderError("数据读取失败了，请稍后再试。");
          return;
        }

        if (!item) {
          renderError("这个旅伴可能已经离开了记录。");
          return;
        }

        let stats = { days: 1, cities: 0, posts: 0 };
        try {
          stats = getTravelStats(id, item.createdAt);
        } catch (_err) {
          stats = { days: daysFrom(item.createdAt), cities: 0, posts: 0 };
        }

        renderMain(item, stats);
      };

      init();
    </script>
  </body>
</html>
