<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miss&Found 失物旅舍 | 欢迎</title>
    <meta name="description" content="Miss&Found 失物旅舍欢迎页，点击任意位置进入。" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      :root {
        --welcome-bg:
          radial-gradient(ellipse 70% 50% at 20% 15%, rgba(240, 184, 212, 0.3), transparent 50%),
          radial-gradient(ellipse 60% 45% at 78% 12%, rgba(165, 180, 232, 0.32), transparent 48%),
          radial-gradient(ellipse 80% 55% at 50% 88%, rgba(196, 181, 216, 0.22), transparent 52%),
          linear-gradient(160deg, #4a5578 0%, #6b7aab 40%, #8a9bc4 70%, #a5b4e8 100%);
      }

      html,
      body {
        min-height: 100%;
      }

      body.welcome-page {
        margin: 0;
        overflow: hidden;
        cursor: pointer;
        background: transparent;
        transition: opacity 0.6s ease;
      }

      body.welcome-page.is-leaving {
        opacity: 0;
      }

      .welcome-screen {
        position: relative;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        text-align: center;
      }

      .welcome-screen::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(74, 85, 120, 0.08),
          rgba(74, 85, 120, 0.18)
        );
        pointer-events: none;
      }

      .welcome-core {
        position: relative;
        z-index: 1;
        display: grid;
        justify-items: center;
        gap: 32px;
        animation: welcome-enter 2.4s ease-in-out both;
      }

      .welcome-pulse {
        width: clamp(160px, 23vw, 260px);
        aspect-ratio: 1;
        border-radius: 50%;
        background:
          radial-gradient(circle at 34% 30%, rgba(255, 255, 255, 0.62), transparent 36%),
          radial-gradient(circle at 62% 66%, rgba(240, 184, 212, 0.42), transparent 58%),
          radial-gradient(circle, rgba(196, 181, 216, 0.45), rgba(74, 85, 120, 0.4));
        box-shadow:
          0 0 40px rgba(240, 184, 212, 0.35),
          0 0 80px rgba(165, 180, 232, 0.25);
        animation: welcome-breathe 5s ease-in-out infinite;
      }

      .welcome-title {
        margin: 0;
        font-family: var(--font-family-title);
        font-weight: 300;
        font-size: clamp(2rem, 4vw, 3.4rem);
        letter-spacing: 0.14em;
        line-height: 1.4;
        color: var(--color-text-primary);
        animation: title-glow 5s ease-in-out infinite;
      }

      .welcome-tip {
        margin: 0;
        color: var(--color-text-secondary);
        font-family: var(--font-family-base);
        font-weight: 300;
        letter-spacing: 0.1em;
        line-height: 2;
        opacity: 0.85;
        animation: dream-breathe 4s ease-in-out infinite;
      }

      @keyframes welcome-enter {
        from {
          opacity: 0;
          translate: 0 20px;
        }
        to {
          opacity: 1;
          translate: 0 0;
        }
      }

      @keyframes welcome-breathe {
        0%,
        100% {
          scale: 0.96;
          opacity: 0.78;
          box-shadow:
            0 0 30px rgba(240, 184, 212, 0.28),
            0 0 60px rgba(165, 180, 232, 0.2);
        }
        50% {
          scale: 1.04;
          opacity: 1;
          box-shadow:
            0 0 50px rgba(240, 184, 212, 0.42),
            0 0 100px rgba(165, 180, 232, 0.32);
        }
      }

      @keyframes title-glow {
        0%,
        100% {
          text-shadow:
            0 0 16px rgba(196, 181, 216, 0.35),
            0 0 32px rgba(240, 184, 212, 0.22);
          opacity: 0.9;
        }
        50% {
          text-shadow:
            0 0 24px rgba(196, 181, 216, 0.55),
            0 0 48px rgba(240, 184, 212, 0.38);
          opacity: 1;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        body.welcome-page {
          transition-duration: 0.001ms;
        }

        .welcome-core,
        .welcome-pulse,
        .welcome-title,
        .welcome-tip {
          animation: none;
        }
      }
    </style>
  </head>
  <body class="welcome-page">
    <div class="page-photo-bg" style="background-image: url('images/bg-star-door.png')" aria-hidden="true"></div>
    <div class="dream-bg" aria-hidden="true">
      <div class="dream-bg__clouds"></div>
      <div class="dream-bg__layer dream-bg__layer--a"></div>
      <div class="dream-bg__layer dream-bg__layer--b"></div>
      <div class="dream-bg__layer dream-bg__layer--c"></div>
      <div class="dream-bg__grain"></div>
    </div>

    <main class="welcome-screen" aria-label="欢迎页面">
      <section class="welcome-core">
        <div class="welcome-pulse" aria-hidden="true"></div>
        <h1 class="welcome-title">Miss&amp;Found 失物旅舍</h1>
        <p class="welcome-tip">点击任意位置进入</p>
      </section>
    </main>

    <script>
      (() => {
        let leaving = false;
        const goNext = () => {
          if (leaving) return;
          leaving = true;
          document.body.classList.add("is-leaving");
          window.setTimeout(() => {
            window.location.href = "./home.html";
          }, 600);
        };

        window.addEventListener("click", goNext, { once: true });
      })();
    </script>
  </body>
</html>
